<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1 - Classic</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;padding:12px}
.container{max-width:650px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);overflow:hidden}
.header{background:#111827;color:white;padding:14px;text-align:center}
.header a{color:#a5b4fc;text-decoration:none;font-size:11px}
.form{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border-bottom:1px solid #eee}
.form input{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px}
.form button{grid-column:1/-1;background:#4f46e5;color:white;border:none;padding:10px;border-radius:6px;font-weight:700;cursor:pointer}
.stats{padding:10px 14px;background:#f9fafb;font-size:11px;color:#6b7280;border-bottom:1px solid #eee}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#f9fafb;padding:8px 10px;text-align:left;font-size:10px;color:#6b7280;text-transform:uppercase;border-bottom:2px solid #eee}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:12px}
.del{border:none;background:#fee2e2;color:#991b1b;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:10px}
.empty{text-align:center;padding:20px;color:#9ca3af;font-size:12px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h2>📱 V1 - Classic</h2>
<p style="font-size:11px;opacity:.7;margin-top:4px">Simple Add / View / Delete</p>
<a href="index.html">← Back to Menu</a>
</div>

<div class="form">
<input id="full_name" placeholder="Full Name *">
<input id="student_id" placeholder="ID * e.g STU001">
<input id="course" placeholder="Course *">
<input id="grade" type="number" placeholder="Grade 0-100 *">
<button onclick="add()">➕ Add Student</button>
</div>

<div class="stats" id="stats">Loading...</div>

<div class="table-wrap">
<table>
<thead><tr><th>Name</th><th>ID</th><th>Course</th><th>Grade</th><th>Action</th></tr></thead>
<tbody id="tbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
</table>
</div>
</div>

<script>
const db=supabase.createClient('https://tuudhnxqmnqxikqgmrzj.supabase.co','sb_publishable_61sdjEEXf09fMqQDz0ybPg_5_p-rPFx');
let all=[];

async function load(){
const {data,error}=await db.from('students_pro').select('*').order('created_at',{ascending:false});
if(error){document.getElementById('stats').textContent='Error: '+error.message;return;}
all=data;
document.getElementById('stats').textContent='Total: '+data.length+' | Online: ● Live';
document.getElementById('tbody').innerHTML=data.length?data.map(s=>`
<tr>
<td><b>${s.full_name}</b></td>
<td>${s.student_id}</td>
<td>${s.course}</td>
<td>${s.grade}%</td>
<td><button class="del" onclick="del(${s.id})">Delete</button></td>
</tr>`).join(''):'<tr><td colspan="5" class="empty">No students yet</td></tr>';
}

async function add(){
const payload={
full_name:document.getElementById('full_name').value.trim(),
student_id:document.getElementById('student_id').value.trim(),
course:document.getElementById('course').value.trim(),
grade:parseInt(document.getElementById('grade').value),
status:'Active',
year_of_study:1
};
if(!payload.full_name||!payload.student_id||!payload.course||isNaN(payload.grade)){return alert('Please fill all fields *');}
const {error}=await db.from('students_pro').insert([payload]);
if(error)return alert(error.message);
document.getElementById('full_name').value='';
document.getElementById('student_id').value='';
document.getElementById('course').value='';
document.getElementById('grade').value='';
load();
}

async function del(id){
if(!confirm('Delete this student?'))return;
await db.from('students_pro').delete().eq('id',id);
load();
}

db.channel('v1').on('postgres_changes',{event:'*',schema:'public',table:'students_pro'},()=>load()).subscribe();
load();
</script>
</body>
</html>
