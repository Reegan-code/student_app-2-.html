<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Pro V4 - Ultimate+ Fixed</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f0f2f5;--card:white;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--primary:#4f46e5}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;--primary:#6366f1}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:12px;transition:.3s}
.container{max-width:1150px;margin:0 auto;background:var(--card);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);overflow:hidden;border:1px solid var(--border)}
.header{background:linear-gradient(135deg,#111827,#4f46e5);color:white;padding:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.btn{border:none;padding:9px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px}
.btn-primary{background:var(--primary);color:white}
.btn-dark{background:#111827;color:white}
.btn-danger{background:#ef4444;color:white}
.btn-success{background:#10b981;color:white}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;background:var(--bg);border-bottom:1px solid var(--border)}
.stat{background:var(--card);padding:12px;border-radius:10px;text-align:center;border:1px solid var(--border)}
.stat b{font-size:18px;color:var(--primary);display:block}
.stat span{font-size:10px;color:var(--muted);text-transform:uppercase}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;border-bottom:1px solid var(--border)}
.chart-box{background:var(--bg);border-radius:10px;padding:12px;height:240px;border:1px solid var(--border)}
.form-section{padding:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;border-bottom:1px solid var(--border)}
label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:3px;display:block}
input,select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:var(--card);color:var(--text)}
.toolbar{padding:10px 12px;display:flex;gap:6px;flex-wrap:wrap;background:var(--bg);border-bottom:1px solid var(--border)}
.toolbar input,.toolbar select{flex:1;min-width:120px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--bg);padding:9px 10px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px}
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover}
.grade{font-weight:700;padding:2px 6px;border-radius:20px;font-size:10px}
.pass{background:#dcfce7;color:#166534}
.fail{background:#fee2e2;color:#991b1b}
.badge{padding:2px 6px;border-radius:12px;font-size:9px;font-weight:700}
.badge.Active{background:#dbeafe;color:#1e40af}.badge.Graduated{background:#dcfce7;color:#166534}.badge.Suspended{background:#fee2e2;color:#991b1b}
.actions{display:flex;gap:4px}
.icon{border:none;background:var(--bg);padding:5px 7px;border-radius:5px;cursor:pointer;font-size:10px;border:1px solid var(--border)}
.icon.del{background:#fee2e2;color:#991b1b}.icon.edit{background:#fef3c7;color:#92400e}.icon.pdf{background:#dbeafe;color:#1e40af}
.empty{text-align:center;padding:30px;color:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:white;padding:10px 14px;border-radius:10px;display:none;z-index:999;font-size:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:var(--card);color:var(--text);padding:20px;border-radius:12px;width:340px;border:1px solid var(--border)}
@media(max-width:850px){.form-section{grid-template-columns:1fr 1fr}.charts{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.form-section{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><h1>🎓 Student Pro V4 - Fixed</h1><p id="status" style="font-size:11px;opacity:.9">Connecting...</p></div>
<div style="display:flex;gap:6px;flex-wrap:wrap">
<button class="btn btn-dark" onclick="toggleDark()">🌙/☀️ Dark</button>
<button class="btn" style="background:white;color:#111827" onclick="document.getElementById('excelInput').click()">📊 Import Excel</button>
<input type="file" id="excelInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(event)">
<button id="loginBtn" class="btn btn-dark" onclick="showLogin()">🔐 Login</button>
<button id="logoutBtn" class="btn btn-danger" style="display:none" onclick="logout()">Logout</button>
</div>
</div>

<div class="stats">
<div class="stat"><b id="total">0</b><span>Total</span></div>
<div class="stat"><b id="avg">0%</b><span>Average</span></div>
<div class="stat"><b id="pass">0</b><span>Pass</span></div>
<div class="stat"><b id="fail">0</b><span>Fail</span></div>
</div>

<div class="charts">
<div class="chart-box"><canvas id="gradeChart"></canvas></div>
<div class="chart-box"><canvas id="courseChart"></canvas></div>
</div>

<div class="form-section" id="formSec">
<div><label>Full Name *</label><input id="full_name" placeholder="Jane Doe"></div>
<div><label>Student ID *</label><input id="student_id" placeholder="STU001"></div>
<div><label>Email</label><input id="email" placeholder="jane@school.edu"></div>
<div><label>Course *</label><input id="course" placeholder="Computer Science"></div>
<div><label>Year (1-6)</label><select id="year_of_study"><option value="1">Y1</option><option value="2">Y2</option><option value="3" selected>Y3</option><option value="4">Y4</option><option value="5">Y5</option><option value="6">Y6</option></select></div>
<div><label>Grade *</label><input id="grade" type="number" min="0" max="100" placeholder="85"></div>
<div><label>Status</label><select id="status_sel"><option>Active</option><option>Graduated</option><option>Suspended</option><option>Inactive</option></select></div>
<div><label>Photo</label><input id="photo" type="file" accept="image/*"></div>
<div style="grid-column:1/-1"><button id="saveBtn" class="btn btn-primary" style="width:100%" onclick="saveStudent()">➕ Add Student</button></div>
<input type="hidden" id="edit_id">
</div>

<div class="toolbar">
<input id="search" placeholder="🔍 Search..." oninput="doFilter()">
<select id="fCourse" onchange="doFilter()"><option value="">All Courses</option></select>
<select id="fStatus" onchange="doFilter()"><option value="">All Status</option><option>Active</option><option>Graduated</option><option>Suspended</option><option>Inactive</option></select>
<button class="btn btn-success" onclick="exportCSV()">CSV</button>
<button class="btn btn-primary" onclick="exportAllPDF()">📄 All PDF Report</button>
</div>

<div class="table-wrap">
<table>
<thead><tr><th>Photo</th><th>Name</th><th>ID</th><th>Course</th><th>Year</th><th>Grade</th><th>Status</th><th>Action</th></tr></thead>
<tbody id="tbody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
</table>
</div>
</div>

<div class="modal" id="loginModal"><div class="modal-box"><h3>Admin Login</h3><p style="font-size:11px;color:var(--muted);margin:8px 0">Password: <b>admin123</b></p><input id="adminPass" type="password" placeholder="Password" style="margin-bottom:10px"><button class="btn btn-primary" style="width:100%" onclick="login()">Login</button><button class="btn" style="width:100%;margin-top:6px;background:var(--bg)" onclick="hideLogin()">Cancel</button></div></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://tuudhnxqmnqxikqgmrzj.supabase.co';
const SUPABASE_KEY='sb_publishable_61sdjEEXf09fMqQDz0ybPg_5_p-rPFx';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let all=[],filtered=[],gradeChart,courseChart;
let isAdmin=localStorage.getItem('isAdmin')==='true';
let dark=localStorage.getItem('dark')==='true';
if(dark)document.documentElement.setAttribute('data-theme','dark');
function toggleDark(){dark=!dark;localStorage.setItem('dark',dark);if(dark)document.documentElement.setAttribute('data-theme','dark');else document.documentElement.removeAttribute('data-theme')}
function updateAuthUI(){
document.getElementById('loginBtn').style.display=isAdmin?'none':'block';
document.getElementById('logoutBtn').style.display=isAdmin?'block':'none';
document.getElementById('formSec').style.opacity=isAdmin?'1':'.5';
document.getElementById('formSec').style.pointerEvents=isAdmin?'auto':'none';
}
function showLogin(){document.getElementById('loginModal').style.display='flex'}
function hideLogin(){document.getElementById('loginModal').style.display='none'}
function login(){if(document.getElementById('adminPass').value==='admin123'){isAdmin=true;localStorage.setItem('isAdmin','true');hideLogin();toast('Admin in!');updateAuthUI();render(filtered);}else toast('Wrong! admin123',true)}
function logout(){isAdmin=false;localStorage.removeItem('isAdmin');toast('Logged out');updateAuthUI();render(filtered)}
async function load(){
const {data,error}=await db.from('students_pro').select('*').order('created_at',{ascending:false});
if(error){document.getElementById('status').textContent='Error:'+error.message;return;}
all=data;document.getElementById('status').textContent='● Online ('+data.length+')'+(isAdmin?' - Admin':' - View Only');
updateCourseFilter();doFilter();
}
function updateCourseFilter(){
const courses=[...new Set(all.map(s=>s.course))];
document.getElementById('fCourse').innerHTML='<option value="">All Courses</option>'+courses.map(c=>`<option>${c}</option>`).join('');
}
function doFilter(){
const q=document.getElementById('search').value.toLowerCase();
const c=document.getElementById('fCourse').value;
const s=document.getElementById('fStatus').value;
filtered=all.filter(x=>{
const mq=!q||x.full_name.toLowerCase().includes(q)||x.student_id.toLowerCase().includes(q);
const mc=!c||x.course===c;
const ms=!s||x.status===s;
return mq&&mc&&ms;
});
render(filtered);
}
function render(list){
document.getElementById('total').textContent=list.length;
const avg=list.length?Math.round(list.reduce((a,b)=>a+b.grade,0)/list.length):0;
document.getElementById('avg').textContent=avg+'%';
document.getElementById('pass').textContent=list.filter(x=>x.grade>=50).length;
document.getElementById('fail').textContent=list.filter(x=>x.grade<50).length;
const tbody=document.getElementById('tbody');
if(list.length===0){tbody.innerHTML='<tr><td colspan="8" class="empty">No students</td></tr>';updateCharts([]);return;}
// FIXED: Course and Year are now separate columns
tbody.innerHTML=list.map(x=>`
<tr>
<td><img class="avatar" src="${x.photo_url||'https://ui-avatars.com/api/?name='+encodeURIComponent(x.full_name)+'&background=4f46e5&color=fff'}"></td>
<td><b>${x.full_name}</b><br><small style="color:var(--muted)">${x.email||''}</small></td>
<td>${x.student_id}</td>
<td>${x.course}</td>
<td>Year ${x.year_of_study||'-'}</td>
<td><span class="grade ${x.grade>=50?'pass':'fail'}">${x.grade}%</span></td>
<td><span class="badge ${x.status}">${x.status}</span></td>
<td><div class="actions">
<button class="icon pdf" onclick="genPDF(${x.id})">PDF</button>
${isAdmin?`<button class="icon edit" onclick="edit(${x.id})">Edit</button><button class="icon del" onclick="del(${x.id})">Del</button>`:'🔒'}
</div></td>
</tr>`).join('');
updateCharts(list);
}
function updateCharts(list){
const ctx1=document.getElementById('gradeChart').getContext('2d');
const ctx2=document.getElementById('courseChart').getContext('2d');
const ranges={'0-39':0,'40-49':0,'50-69':0,'70-84':0,'85-100':0};
list.forEach(s=>{if(s.grade<40)ranges['0-39']++;else if(s.grade<50)ranges['40-49']++;else if(s.grade<70)ranges['50-69']++;else if(s.grade<85)ranges['70-84']++;else ranges['85-100']++;});
if(gradeChart)gradeChart.destroy();
gradeChart=new Chart(ctx1,{type:'bar',data:{labels:Object.keys(ranges),datasets:[{label:'Students',data:Object.values(ranges),backgroundColor:'#6366f1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:'Grade Distribution'}}}});
const cmap={};list.forEach(s=>{cmap[s.course]=(cmap[s.course]||0)+1});
if(courseChart)courseChart.destroy();
courseChart=new Chart(ctx2,{type:'doughnut',data:{labels:Object.keys(cmap),datasets:[{data:Object.values(cmap),backgroundColor:['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:'By Course'}}}});
}
async function saveStudent(){
if(!isAdmin){showLogin();return;}
const payload={
full_name:document.getElementById('full_name').value.trim(),
student_id:document.getElementById('student_id').value.trim(),
email:document.getElementById('email').value.trim()||null,
course:document.getElementById('course').value.trim(),
year_of_study:parseInt(document.getElementById('year_of_study').value),
grade:parseInt(document.getElementById('grade').value),
status:document.getElementById('status_sel').value
};
if(!payload.full_name||!payload.student_id||!payload.course||isNaN(payload.grade)){toast('Fill required *',true);return;}
const file=document.getElementById('photo').files[0];
if(file){
toast('Uploading photo...');
const fn=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'');
const {error:upErr}=await db.storage.from('student-photos').upload(fn,file);
if(upErr){toast(upErr.message,true);return;}
const {data}=db.storage.from('student-photos').getPublicUrl(fn);
payload.photo_url=data.publicUrl;
}
const editId=document.getElementById('edit_id').value;
document.getElementById('saveBtn').disabled=true;
let err;
if(editId){
if(!payload.photo_url) delete payload.photo_url;
const res=await db.from('students_pro').update(payload).eq('id',editId);
err=res.error;
}else{
const res=await db.from('students_pro').insert([payload]);
err=res.error;
}
document.getElementById('saveBtn').disabled=false;
if(err){toast(err.message,true);return;}
toast(editId?'Updated!':'Added!');clearForm();load();
}
function edit(id){
if(!isAdmin){showLogin();return;}
const s=all.find(x=>x.id===id);
document.getElementById('full_name').value=s.full_name;
document.getElementById('student_id').value=s.student_id;
document.getElementById('email').value=s.email||'';
document.getElementById('course').value=s.course;
document.getElementById('year_of_study').value=s.year_of_study;
document.getElementById('grade').value=s.grade;
document.getElementById('status_sel').value=s.status;
document.getElementById('edit_id').value=s.id;
document.getElementById('saveBtn').textContent='Update Student';
window.scrollTo({top:0,behavior:'smooth'});
}
function clearForm(){
['full_name','student_id','email','course','grade'].forEach(i=>document.getElementById(i).value='');
document.getElementById('photo').value='';document.getElementById('edit_id').value='';document.getElementById('saveBtn').textContent='➕ Add Student';
}
async function del(id){
if(!isAdmin){toast('Admin only!',true);return;}
if(!confirm('Delete?'))return;
await db.from('students_pro').delete().eq('id',id);toast('Deleted');load();
}
function exportCSV(){
let csv='Full Name,Student ID,Email,Course,Year,Grade,Status\n';
filtered.forEach(s=>{csv+=`"${s.full_name}","${s.student_id}","${s.email||''}","${s.course}",${s.year_of_study||''},${s.grade},"${s.status}"\n`});
const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='students.csv';a.click();
}
function genPDF(id){
const s=all.find(x=>x.id===id);
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.setFillColor(79,70,229);doc.rect(0,0,210,30,'F');
doc.setTextColor(255,255,255);doc.setFontSize(18);doc.text('Student Report Card',20,18);
doc.setTextColor(0,0,0);doc.setFontSize(12);
doc.text(`Name: ${s.full_name}`,20,50);
doc.text(`Student ID: ${s.student_id}`,20,60);
doc.text(`Email: ${s.email||'N/A'}`,20,70);
doc.text(`Course: ${s.course}`,20,80);
doc.text(`Year: ${s.year_of_study}`,20,90);
doc.text(`Grade: ${s.grade}% - ${s.grade>=50?'PASS':'FAIL'}`,20,100);
doc.text(`Status: ${s.status}`,20,110);
doc.text(`Date: ${new Date().toLocaleDateString()}`,20,130);
doc.setFontSize(10);doc.text('Generated by Student Pro V4',20,190);
doc.save(`${s.student_id}_Report.pdf`);
toast('PDF Generated!');
}
function exportAllPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.setFillColor(79,70,229);doc.rect(0,0,210,20,'F');
doc.setTextColor(255,255,255);doc.text('All Students Report',20,13);
doc.setTextColor(0,0,0);doc.setFontSize(10);
let y=30;
doc.text('Name | ID | Course | Year | Grade | Status',20,y);y+=8;
filtered.forEach(s=>{
if(y>280){doc.addPage();y=20;}
doc.text(`${s.full_name.substring(0,15)} | ${s.student_id} | ${s.course.substring(0,10)} | Y${s.year_of_study} | ${s.grade}% | ${s.status}`,20,y);
y+=7;
});
doc.save('All_Students_Report.pdf');toast('Full Report PDF!');
}
async function importExcel(e){
if(!isAdmin){showLogin();return;}
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=async function(evt){
const data=new Uint8Array(evt.target.result);
const wb=XLSX.read(data,{type:'array'});
const ws=wb.Sheets[wb.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(ws);
if(json.length===0){toast('Empty Excel',true);return;}
toast(`Importing ${json.length} students...`);
for(let row of json){
const payload={
full_name:row['Full Name']||row['Name']||row['full_name']||'',
student_id:row['Student ID']||row['ID']||row['student_id']||'STU'+Date.now()+Math.random().toString(36).substring(2,5),
email:row['Email']||row['email']||null,
course:row['Course']||row['course']||'General',
year_of_study:parseInt(row['Year']||row['year_of_study']||1),
grade:parseInt(row['Grade']||row['grade']||0),
status:row['Status']||'Active'
};
if(payload.full_name) await db.from('students_pro').insert([payload]);
}
toast(`Imported ${json.length} students!`);load();
};
reader.readAsArrayBuffer(file);
}
function toast(m,e=false){const t=document.getElementById('toast');t.textContent=m;t.style.background=e?'#dc2626':'#111827';t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
db.channel('v4').on('postgres_changes',{event:'*',schema:'public',table:'students_pro'},()=>load()).subscribe();
updateAuthUI();load();
</script>
</body>
</html>
