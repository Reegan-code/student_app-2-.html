<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record System Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
            background: #f4f7fa; 
            padding: 20px;
        }
        .header { 
            background: linear-gradient(135deg, #1e40af, #3b82f6); 
            color: white; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-group { margin-bottom: 18px; }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            color: #374151;
        }
        input, select { 
            width: 100%; 
            padding: 10px 12px; 
            border: 2px solid #e5e7eb; 
            border-radius: 8px; 
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button { 
            background: #2563eb; 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
        }
        button:hover { background: #1d4ed8; }
        .btn-delete { background: #dc2626; }
        .btn-delete:hover { background: #b91c1c; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 25px;
        }
        th, td { 
            border: 1px solid #e5e7eb; 
            padding: 12px; 
            text-align: left; 
        }
        th { 
            background: #f9fafb; 
            font-weight: 600;
            color: #374151;
        }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin: 25px 0;
        }
        .stat-card { 
            background: #eff6ff; 
            padding: 20px; 
            border-radius: 8px; 
            border-left: 4px solid #3b82f6;
        }
        .stat-card h3 { color: #1e40af; font-size: 14px; margin-bottom: 5px; }
        .stat-card p { font-size: 24px; font-weight: 700; color: #1e3a8a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Student Record System Pro</h1>
        <p>Manage student data efficiently</p>
    </div>
